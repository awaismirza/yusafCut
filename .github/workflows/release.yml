name: Release

# Triggered by pushing a version tag, e.g.:
#   git tag v3.1.0 && git push --tags
#
# The workflow:
#   1. Assembles all five sidecar binaries (with caching for the slow builds)
#   2. Signs the app bundle with your Apple Developer ID certificate
#   3. Notarises the DMG with Apple and staples the ticket
#   4. Creates a GitHub Release and attaches the DMG as a downloadable asset
#
# Required repository secrets (Settings → Secrets → Actions):
#   APPLE_CERTIFICATE          base64-encoded Developer ID p12:
#                                base64 -i your-cert.p12 | pbcopy
#   APPLE_CERTIFICATE_PASSWORD password used when exporting the p12
#   APPLE_SIGNING_IDENTITY     "Developer ID Application: Your Name (TEAMID)"
#                                security find-identity -v -p codesigning
#   APPLE_ID                   your Apple ID email
#   APPLE_PASSWORD             app-specific password from appleid.apple.com
#   APPLE_TEAM_ID              10-char team ID from developer.apple.com/account

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  # Pin to a known-good whisper.cpp release. Update here to upgrade.
  WHISPER_VERSION: v1.7.5

jobs:
  release:
    name: Build · Sign · Notarise · Release
    runs-on: macos-14

    steps:
      # ── 1. Checkout & toolchain ───────────────────────────────────────────
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install npm dependencies
        run: npm ci

      # ── 2. ffmpeg + ffprobe ──────────────────────────────────────────────
      - name: Download ffmpeg + ffprobe
        run: |
          BINS="src-tauri/binaries"
          mkdir -p "$BINS"

          curl -fsSL "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip" -o ffmpeg.zip
          unzip -o ffmpeg.zip
          mv ffmpeg "$BINS/ffmpeg-aarch64-apple-darwin"
          chmod +x "$BINS/ffmpeg-aarch64-apple-darwin"
          rm ffmpeg.zip

          curl -fsSL "https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip" -o ffprobe.zip
          unzip -o ffprobe.zip
          mv ffprobe "$BINS/ffprobe-aarch64-apple-darwin"
          chmod +x "$BINS/ffprobe-aarch64-apple-darwin"
          rm ffprobe.zip

      # ── 3. whisper-cli ───────────────────────────────────────────────────
      # Built from whisper.cpp source with CoreML + Metal support.
      # Cache is keyed on the pinned version — hit = instant, miss = ~12 min.
      - name: Cache whisper-cli binary
        id: cache-whisper
        uses: actions/cache@v4
        with:
          path: src-tauri/binaries/whisper-cli-aarch64-apple-darwin
          key: whisper-cli-${{ env.WHISPER_VERSION }}-macos14-arm64

      - name: Build whisper-cli from source
        if: steps.cache-whisper.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "$WHISPER_VERSION" \
            https://github.com/ggerganov/whisper.cpp whisper.cpp
          cd whisper.cpp
          WHISPER_COREML=1 WHISPER_METAL=1 make -j$(sysctl -n hw.logicalcpu) main
          cp main "../src-tauri/binaries/whisper-cli-aarch64-apple-darwin"
          chmod +x "../src-tauri/binaries/whisper-cli-aarch64-apple-darwin"
          cd .. && rm -rf whisper.cpp

      # ── 4. whisperkit-cli ────────────────────────────────────────────────
      # Built via Swift PM from argmaxinc/WhisperKit.
      # Cache keyed on the latest WhisperKit release tag.
      - name: Resolve WhisperKit version
        id: wk-version
        run: |
          TAG=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/argmaxinc/WhisperKit/releases/latest" \
            2>/dev/null | grep '"tag_name"' | head -1 \
            | sed 's/.*"tag_name": *"\([^"]*\)".*/\1/')
          echo "tag=${TAG:-v0.14.0}" >> "$GITHUB_OUTPUT"

      - name: Cache whisperkit-cli binary
        id: cache-whisperkit
        uses: actions/cache@v4
        with:
          path: src-tauri/binaries/whisperkit-cli-aarch64-apple-darwin
          key: whisperkit-cli-${{ steps.wk-version.outputs.tag }}-macos14-arm64

      - name: Build whisperkit-cli from source
        if: steps.cache-whisperkit.outputs.cache-hit != 'true'
        run: bash scripts/build-whisperkit-cli.sh "${{ steps.wk-version.outputs.tag }}"

      # ── 5. mlx-sidecar ───────────────────────────────────────────────────
      # Python bundled into a single Mach-O via PyInstaller.
      # Cache keyed on sidecar source content hash.
      - name: Cache mlx-sidecar binary
        id: cache-mlx
        uses: actions/cache@v4
        with:
          path: src-tauri/binaries/mlx-sidecar-aarch64-apple-darwin
          key: mlx-sidecar-${{ hashFiles('sidecars/mlx-llm/**') }}-macos14

      - name: Build mlx-sidecar (PyInstaller)
        if: steps.cache-mlx.outputs.cache-hit != 'true'
        run: |
          python3 -m venv sidecars/mlx-llm/.venv
          sidecars/mlx-llm/.venv/bin/pip install -q --upgrade pip
          sidecars/mlx-llm/.venv/bin/pip install -q pyinstaller -e sidecars/mlx-llm
          sidecars/mlx-llm/.venv/bin/python sidecars/mlx-llm/build.py

      # ── 6. Verify all five binaries are real compiled binaries ───────────
      - name: Verify sidecar binaries
        run: |
          for bin in whisper-cli whisperkit-cli ffmpeg ffprobe mlx-sidecar; do
            f="src-tauri/binaries/${bin}-aarch64-apple-darwin"
            if [[ ! -x "$f" ]]; then
              echo "FAIL: $f is missing or not executable" && exit 1
            fi
            if head -c2 "$f" 2>/dev/null | grep -q '^#!'; then
              echo "FAIL: $f is a shell stub, not a compiled binary" && exit 1
            fi
            echo "OK: $f ($(du -sh "$f" | awk '{print $1}'))"
          done

      # ── 7. Import Apple Developer ID certificate ─────────────────────────
      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychain -d user -s build.keychain

      # ── 8. Build production DMG ──────────────────────────────────────────
      - name: Build DMG
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_SKIP_DEVSERVER_CHECK: "true"
          CI: "true"
        run: npx tauri build --bundles dmg

      # ── 9. Notarise + staple ─────────────────────────────────────────────
      - name: Notarise DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          echo "Notarising: $DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_PASSWORD" \
            --wait
          xcrun stapler staple "$DMG"

      # ── 10. Create GitHub Release and attach DMG ─────────────────────────
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          gh release create "$GITHUB_REF_NAME" "$DMG" \
            --title "Scribe $GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag

      # ── 11. Cleanup (always runs) ────────────────────────────────────────
      - name: Cleanup keychain and certificate
        if: always()
        run: |
          security delete-keychain build.keychain 2>/dev/null || true
          rm -f certificate.p12
